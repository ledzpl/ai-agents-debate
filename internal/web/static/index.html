<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Debate Web</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <main class="wrap">
    <div class="app-shell">
      <header class="hero">
        <h1>Debate Web</h1>
      </header>

      <div class="layout">
        <aside class="panel sidebar">
          <div class="section-head">
            <h2>Persona Group</h2>
          </div>
          <label for="personaGroup">그룹 선택</label>
          <select id="personaGroup" aria-label="persona 그룹 선택"></select>
          <div class="meta" id="personaMeta">persona 정보를 불러오는 중...</div>
          <div class="persona-list" id="personaList">
            <div class="placeholder small">persona 목록을 불러오는 중...</div>
          </div>
        </aside>

        <section class="panel discussion">
          <div class="discussion-head">
            <h2>토론 타임라인</h2>
            <div class="discussion-meta">
              <div class="turn-meta" id="turnMeta">0 턴</div>
              <div class="status-strip" id="statusStrip" aria-live="polite">
                <span class="status-chip" id="phaseMeta">Phase: -</span>
                <span class="status-chip" id="elapsedMeta">Elapsed: 00:00</span>
                <span class="status-chip" id="speakerMeta">Speaker: -</span>
              </div>
            </div>
          </div>

          <div class="timeline-toolbar">
            <div class="timeline-filters" id="timelineFilters" role="group" aria-label="타임라인 필터">
              <button type="button" class="filter-chip is-active" data-kind="persona">Persona</button>
              <button type="button" class="filter-chip is-active" data-kind="moderator">Moderator</button>
              <button type="button" class="filter-chip is-active" data-kind="system">System</button>
              <button type="button" class="filter-chip is-active" data-kind="summary">Summary</button>
            </div>
            <label class="compact-toggle" for="compactToggle">
              <input type="checkbox" id="compactToggle" />
              <span>Compact view</span>
            </label>
          </div>

          <div class="debate-window" id="debateWindow" aria-live="polite">
            <div class="placeholder">아직 실행된 토론이 없습니다. 주제를 입력하고 실행해 주세요.</div>
          </div>

          <div class="controls">
            <div class="progress-wrap" id="progressWrap" aria-hidden="true">
              <div class="progress-track">
                <div class="progress-fill"></div>
              </div>
            </div>
            <div class="compose-box">
              <textarea id="problem" placeholder="토론하고 싶은 주제를 입력하세요..." aria-label="토론 주제"></textarea>
              <details class="advanced-panel">
                <summary>Advanced 설정</summary>
                <div class="advanced-grid">
                  <label for="audienceMode">Audience Mode</label>
                  <select id="audienceMode" aria-label="audience mode">
                    <option value="">서버 기본값</option>
                    <option value="general">general</option>
                    <option value="expert">expert</option>
                  </select>

                  <label for="maxTurns">Max Turns</label>
                  <input id="maxTurns" type="number" min="0" placeholder="예: 12 (0=unbounded)" />

                  <label for="consensusThreshold">Consensus Threshold</label>
                  <input id="consensusThreshold" type="number" min="0" max="1" step="0.01" placeholder="예: 0.85" />

                  <label for="maxNoProgressJudges">Max No Progress Judges</label>
                  <input id="maxNoProgressJudges" type="number" min="1" placeholder="예: 6" />

                  <label for="noProgressEpsilon">No Progress Epsilon</label>
                  <input id="noProgressEpsilon" type="number" min="0.000001" step="0.001" placeholder="예: 0.01" />

                  <label for="unlimitedHardMaxTurns">Unlimited Hard Max Turns</label>
                  <input id="unlimitedHardMaxTurns" type="number" min="1" placeholder="예: 400" />

                  <label for="directHandoffJudgeEvery">Direct Handoff Judge Every</label>
                  <input id="directHandoffJudgeEvery" type="number" min="1" placeholder="예: 2" />

                  <label for="llmHistoryTurnWindow">LLM History Turn Window</label>
                  <input id="llmHistoryTurnWindow" type="number" min="1" placeholder="예: 120" />

                  <label for="maxDurationSeconds">Max Duration (sec)</label>
                  <input id="maxDurationSeconds" type="number" min="1" placeholder="예: 1200" />

                  <label for="maxTotalTokens">Max Total Tokens</label>
                  <input id="maxTotalTokens" type="number" min="1" placeholder="예: 120000" />

                  <label for="runTimeoutSeconds">Run Timeout (sec)</label>
                  <input id="runTimeoutSeconds" type="number" min="1" placeholder="예: 1800" />
                </div>
                <div class="advanced-actions">
                  <button id="advancedResetBtn" type="button">고급 설정 초기화</button>
                </div>
              </details>
              <div class="control-row">
                <div class="meta" id="statusText">대기 중</div>
                <div class="action-buttons">
                  <button id="runBtn">토론 실행</button>
                  <button id="stopBtn" disabled>토론 중지</button>
                </div>
              </div>
            </div>
            <div class="error" id="errorText"></div>
          </div>
        </section>
      </div>
    </div>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
